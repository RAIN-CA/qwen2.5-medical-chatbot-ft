model_name: Qwen/Qwen2.5-0.5B-Instruct

data:
  train_file: data/processed/train.jsonl
  val_file: data/processed/validation.jsonl
  max_length: 512

training:
  output_dir: outputs/qwen25_medchat_full
  num_train_epochs: 2
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 2e-4
  weight_decay: 0.0
  logging_steps: 20
  eval_steps: 200
  save_steps: 200
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  max_grad_norm: 1.0
  bf16: false
  fp16: true
  gradient_checkpointing: true

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - up_proj
    - down_proj
    - gate_proj

misc:
  seed: 42
  report_to: tensorboard
