model_name: facebook/bart-base

data:
  train_file: data/processed/small_train.jsonl
  val_file: data/processed/small_validation.jsonl
  max_source_length: 512
  max_target_length: 128

training:
  output_dir: outputs/experiments/bart/base/medical_ft/adapter
  num_train_epochs: 1
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 2
  learning_rate: 5e-5
  weight_decay: 0.01
  logging_steps: 10
  eval_steps: 50
  save_steps: 50
  warmup_ratio: 0.03
  lr_scheduler_type: linear
  max_grad_norm: 1.0
  bf16: false
  fp16: true
  gradient_checkpointing: false

misc:
  seed: 42
  report_to: none
