model_name: Qwen/Qwen2.5-3B-Instruct

data:
  train_file: data/processed/balanced_multidomain_train.jsonl
  val_file: data/processed/balanced_multidomain_validation.jsonl
  max_length: 512

training:
  output_dir: outputs/experiments/qwen25/3b/balanced_multidomain_ft/adapter
  num_train_epochs: 1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  weight_decay: 0.01
  logging_steps: 10
  eval_steps: 50
  save_steps: 50
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  max_grad_norm: 1.0
  bf16: false
  fp16: true
  gradient_checkpointing: false

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: float16

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

misc:
  seed: 42
  report_to: none
